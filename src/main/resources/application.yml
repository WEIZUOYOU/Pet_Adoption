server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/pet_adoption?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=UTF-8
    username: root
    password: W123456
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    show-sql: true
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect

# SpringDoc OpenAPI (Swagger) 配置
springdoc:
  api-docs:
    enabled: ${swagger.enabled:true}
  swagger-ui:
    enabled: ${swagger.enabled:true}
    path: /swagger-ui.html

# Swagger 启用/禁用开关（生产环境建议设置为 false）
swagger:
  enabled: true